steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/careassist-api:$SHORT_SHA', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/careassist-api:$SHORT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'careassist-api'
      - '--image=gcr.io/$PROJECT_ID/careassist-api:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=DEMO_MODE=false,GCP_LOCATION=us-central1'
      - '--set-secrets=GOOGLE_API_KEY=gemini-api-key:latest,PINECONE_API_KEY=pinecone-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/careassist-api:$SHORT_SHA'
